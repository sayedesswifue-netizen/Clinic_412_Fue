<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#0A0F1E;--bg-secondary:#111827;--bg-card:#1A2537;--bg-card-hover:#22304A;
  --accent:#00E5B8;--accent-dim:rgba(0,229,184,.12);--accent-glow:rgba(0,229,184,.25);
  --warning:#FBBF24;--danger:#EF4444;--success:#34D399;--info:#60A5FA;
  --text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
  --border:#1E293B;--border-light:#334155;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;height:100vh}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:linear-gradient(180deg,#0D1525 0%,#111D32 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s ease;z-index:30}
.sidebar .logo-area{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar .logo-area h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.sidebar .logo-area p{font-size:11px;color:var(--text-muted);margin-top:2px}
.nav-section{padding:12px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 16px;margin:2px 8px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--text-secondary);position:relative}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text-primary)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item i{width:18px;text-align:center;font-size:14px}

/* Main */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{height:56px;min-height:56px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.top-bar .breadcrumb{font-size:13px;color:var(--text-muted)}
.top-bar .breadcrumb span{color:var(--text-primary);font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg-primary);position:relative}
.content::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,184,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,229,184,.02) 0%,transparent 50%);pointer-events:none}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.card:hover{border-color:var(--border-light)}
.kpi-card{position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi-card.teal::after{background:var(--accent)}.kpi-card.amber::after{background:var(--warning)}.kpi-card.red::after{background:var(--danger)}.kpi-card.blue::after{background:var(--info)}.kpi-card.green::after{background:var(--success)}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;line-height:1}
.kpi-label{font-size:12px;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--bg-secondary);position:sticky;top:0;z-index:2}
.data-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
.data-table tbody tr:hover{background:rgba(255,255,255,.02)}
.data-table tbody td{padding:10px 12px;color:var(--text-secondary);white-space:nowrap}
.data-table tbody td:first-child{color:var(--text-primary);font-weight:500}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge-open{background:rgba(251,191,36,.12);color:#FBBF24}.badge-open::before{background:#FBBF24}
.badge-inprogress{background:rgba(96,165,250,.12);color:#60A5FA}.badge-inprogress::before{background:#60A5FA}
.badge-closed{background:rgba(52,211,153,.12);color:#34D399}.badge-closed::before{background:#34D399}
.badge-cancelled{background:rgba(100,116,139,.12);color:#94A3B8}.badge-cancelled::before{background:#94A3B8}
.badge-critical{background:rgba(239,68,68,.12);color:#EF4444}.badge-critical::before{background:#EF4444}
.badge-high{background:rgba(249,115,22,.12);color:#F97316}.badge-high::before{background:#F97316}
.badge-medium{background:rgba(251,191,36,.12);color:#FBBF24}.badge-medium::before{background:#FBBF24}
.badge-low{background:rgba(52,211,153,.12);color:#34D399}.badge-low::before{background:#34D399}
.badge-ok{background:rgba(52,211,153,.12);color:#34D399}.badge-ok::before{background:#34D399}
.badge-due{background:rgba(251,191,36,.12);color:#FBBF24}.badge-due::before{background:#FBBF24}
.badge-overdue{background:rgba(239,68,68,.12);color:#EF4444}.badge-overdue::before{background:#EF4444}
.badge-active{background:rgba(52,211,153,.12);color:#34D399}.badge-active::before{background:#34D399}
.badge-inactive{background:rgba(100,116,139,.12);color:#94A3B8}.badge-inactive::before{background:#94A3B8}
.badge-out{background:rgba(239,68,68,.12);color:#EF4444}.badge-out::before{background:#EF4444}

// Map Arabic fault to English category
function faultToCategory(ar){
  if(ar.includes('تسريب مياه')||ar.includes('انسداد')) return 'Mechanical';
  if(ar.includes('شفط')||ar.includes('هواء')) return 'Pneumatic';
  if(ar.includes('حركة الكرسي')) return 'Hydraulic';
  if(ar.includes('إضاءة')||ar.includes('كهرباء')||ar.includes('Touchpad')||ar.includes('دواسة')) return 'Electrical';
  if(ar.includes('قبضات')||ar.includes('توربين')) return 'Mechanical';
  if(ar.includes('تلف مادي')) return 'Cosmetic';
  if(ar.includes('تعقيم')) return 'Software';
  if(ar.includes('حرارة')||ar.includes('ضغط')||ar.includes('بخار')) return 'Mechanical';
  if(ar.includes('حساس')||ar.includes('أشعة نفسه')) return 'Electrical';
  if(ar.includes('كمبيوتر')||ar.includes('شاشة')||ar.includes('شبكة')||ar.includes('برنامج')) return 'Software';
  return 'Other';
}
function faultToPriority(ar){
  const item = PM_LIBRARY.find(f=>f.desc===ar);
  if(!item) return 'Medium';
  if(item.priority==='طارئة') return 'Critical';
  if(item.priority==='عالية') return 'High';
  if(item.priority==='متوسطة') return 'Medium';
  return 'Low';
}

// Load / Save state
let DB;
function loadDB(){
  try {
    const saved = localStorage.getItem('clinic412_cmms');
    if(saved){ DB = JSON.parse(saved); }
    else { DB = getDefaultData(); saveDB(); }
  } catch(e){ DB = getDefaultData(); saveDB(); }
}
function saveDB(){ 
  // Embed fault types mapping so fault_report.html can read it
  DB.faultTypesByCategory = FAULT_TYPES_BY_CATEGORY;
  localStorage.setItem('clinic412_cmms', JSON.stringify(DB)); 
  pushToServer();
}
function resetDB(){ if(confirm('Reset all data to defaults? This cannot be undone.')){localStorage.removeItem('clinic412_cmms');loadDB();navigate('dashboard');toast('System reset to defaults','info');} }

function clearTestData(){
  const faultCount = DB.faults.length, woCount = DB.workOrders.length;
  if(!confirm(`This will permanently delete ALL ${faultCount} fault ticket(s) and ${woCount} work order(s).\n\nAssets, engineers, spare parts, and purchase orders will NOT be affected.\n\nThis cannot be undone. Continue?`)) return;
  // Revert any spare-part quantities that were consumed by these test faults/work orders,
  // so stock levels don't stay artificially low after the test tickets are wiped.
  DB.faults.forEach(f=>{
    if(f.partNumber && f.qtyUsed){
      const p = DB.spareParts.find(x=>x.partNumber===f.partNumber);
      if(p) p.qtyUsed = Math.max(0, p.qtyUsed - f.qtyUsed);
    }
  });
  DB.faults = [];
  DB.workOrders = [];
  DB.nextTicket = 1;
  DB.nextWO = 1;
  saveDB();
  navigate('dashboard');
  toast(`Cleared ${faultCount} test ticket(s) and ${woCount} work order(s)`, 'info');
}

const CONFIG = {
  // Paste the /exec URL from your Apps Script deployment here (or set it
  // once from the Setup page — it will be remembered on this browser).
  // Must be the SAME URL used in fault_report.html.
  APPS_SCRIPT_URL: localStorage.getItem('clinic412_gas_url') || 'https://script.google.com/macros/s/PASTE_DEPLOYMENT_ID/exec'
};
function setGasUrl(url){
  CONFIG.APPS_SCRIPT_URL = url.trim();
  localStorage.setItem('clinic412_gas_url', CONFIG.APPS_SCRIPT_URL);
  pullFromServer(true);
}

let _syncing = false;
let _pushTimer = null;

function setSyncStatus(text){
  const el = document.getElementById('sync-status');
  if (el) el.textContent = text;
}

function isConfigured(){
  return CONFIG.APPS_SCRIPT_URL && CONFIG.APPS_SCRIPT_URL.indexOf('PASTE_DEPLOYMENT_ID') === -1;
}

// Push the full local DB up to the server (debounced so rapid edits
// don't fire dozens of requests).
function pushToServer(){
  if (!isConfigured()) { setSyncStatus('⚙️ Not connected — set Apps Script URL in Setup'); return; }
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(() => {
    setSyncStatus('🔄 Saving…');
    fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveDB', db: DB }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    }).then(r => r.json()).then(j => {
      if (j.status === 'success') setSyncStatus('✅ Synced ' + new Date().toLocaleTimeString());
      else setSyncStatus('⚠️ Sync error');
    }).catch(() => setSyncStatus('⚠️ Offline — saved locally only'));
  }, 800);
}

// Pull the latest DB from the server (source of truth across devices).
// If the server has no data yet, push our current local/demo data instead.
function pullFromServer(manual){
  if (!isConfigured()) { setSyncStatus('⚙️ Not connected — set Apps Script URL in Setup'); return; }
  if (_syncing) return;
  _syncing = true;
  if (manual) setSyncStatus('🔄 Syncing…');
  fetch(CONFIG.APPS_SCRIPT_URL + '?action=getDB')
    .then(r => r.json())
    .then(server => {
      if (server && server.status === 'error') {
        // Server empty/not initialized yet -> bootstrap it with local data
        setSyncStatus('⬆️ Uploading initial data…');
        pushToServer();
        return;
      }
      const oldFaultCount = (DB.faults || []).length;
      DB = server;
      localStorage.setItem('clinic412_cmms', JSON.stringify(DB));
      const newFaultCount = (DB.faults || []).length;
      if (newFaultCount > oldFaultCount) {
        const latest = DB.faults[DB.faults.length - 1];
        if (latest) toast('New fault report: ' + latest.ticketNo + ' — ' + latest.assetCode, 'info');
      }
      setSyncStatus('✅ Synced ' + new Date().toLocaleTimeString());
      navigate(currentPage);
      buildNav();
    })
    .catch(() => setSyncStatus('⚠️ Offline — showing local data'))
    .finally(() => { _syncing = false; });
}

function toast(msg, type='success'){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i>${msg}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(100%)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},3000);
}

function getAsset(code){ return DB.assets.find(a=>a.assetCode===code); }
function getEngineer(code){ const e = DB.engineers.find(e=>e.code===code); return e?e.name:'—'; }
function getPartCost(pn){ const p = DB.spareParts.find(s=>s.partNumber===pn); return p?p.unitCost:0; }

function pmStatus(lastPM, freq){
  if(!lastPM) return {status:'OK',daysLeft:freq,nextPM:null};
  const last = new Date(lastPM); const next = new Date(last); next.setDate(next.getDate()+freq);
  const diff = Math.ceil((next - TODAY)/(1000*60*60*24));
  if(diff < 0) return {status:'Overdue',daysLeft:diff,nextPM:next.toISOString().split('T')[0]};
  if(diff <= 14) return {status:'Due',daysLeft:diff,nextPM:next.toISOString().split('T')[0]};
  return {status:'OK',daysLeft:diff,nextPM:next.toISOString().split('T')[0]};
}

function stockStatus(part){
  const avail = part.initialQty - part.qtyUsed;
  if(avail <= 0) return 'Out';
  if(avail <= part.minQty) return 'Reorder';
  return 'OK';
}
function partAvailable(pn){ const p = DB.spareParts.find(s=>s.partNumber===pn); return p?p.initialQty-p.qtyUsed:0; }

function daysBetween(d1,d2){ return Math.ceil((new Date(d2)-new Date(d1))/(1000*60*60*24)); }

let currentPage = 'dashboard';
let chartInstances = [];

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(item => {
    if(item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item ${currentPage===item.id?'active':''}" data-page="${item.id}"><i class="fa-solid ${item.icon}"></i>${item.label}</div>`;
  }).join('');
  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', ()=>{
      navigate(el.dataset.page);
      document.getElementById('sidebar').classList.remove('open');
    });
  });
}

function navigate(page){
  currentPage = page;
  chartInstances.forEach(c=>c.destroy());
  chartInstances = [];
  buildNav();
  const label = NAV.find(n=>n.id===page);
  document.getElementById('breadcrumb').innerHTML = `<span>${label?label.label:page}</span>`;
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="page-enter">' + renderPage(page) + '</div>';
  attachPageEvents(page);
  if(page==='dashboard') initDashboardCharts();
}

function renderPage(page){
  switch(page){
    case 'dashboard': return renderDashboard();
    case 'assets': return renderAssets();
    case 'faults': return renderFaults();
    case 'workorders': return renderWorkOrders();
    case 'pm_schedule': return renderPMSchedule();
    case 'spareparts': return renderSpareParts();
    case 'purchaseorders': return renderPurchaseOrders();
    case 'search': return renderSearch();
    case 'engineers': return renderEngineers();
    case 'teams': return renderTeams();
    case 'qr_master': return renderQRMaster();
    case 'pm_library': return renderPMLibrary();
    case 'mgmt_brief': return renderMgmtBrief();
    case 'setup': return renderSetup();
    default: return '<p>Page not found</p>';
  }
}

function kpiStats(){
  const faults = DB.faults;
  const open = faults.filter(f=>f.status==='Open').length;
  const inProg = faults.filter(f=>f.status==='In Progress').length;
  const closed = faults.filter(f=>f.status==='Closed').length;
  const highCrit = faults.filter(f=>f.priority==='High'||f.priority==='Critical').length;
  const totalPartsCost = faults.reduce((s,f)=>s+(f.unitCost*f.qtyUsed||0),0);

  const pmData = DB.assets.map(a=>pmStatus(a.lastPM, a.pmFrequency));
  const pmOverdue = pmData.filter(p=>p.status==='Overdue').length;
  const pmDue = pmData.filter(p=>p.status==='Due').length;

  const woOpen = DB.workOrders.filter(w=>w.status!=='Closed').length;
  const woClosed = DB.workOrders.filter(w=>w.status==='Closed').length;

  const spValue = DB.spareParts.reduce((s,p)=>s+(p.initialQty-p.qtyUsed)*p.unitCost,0);
  const spConsumed = DB.spareParts.reduce((s,p)=>s+p.qtyUsed*p.unitCost,0);
  const spReorder = DB.spareParts.reduce((s,p)=>{
    const avail = p.initialQty-p.qtyUsed;
    if(avail<p.minQty) return s + Math.max(0, Math.ceil(p.minQty*1.5)-avail)*p.unitCost;
    return s;
  },0);

  return {totalAssets:DB.assets.length, open, inProg, closed, highCrit, totalPartsCost, pmOverdue, pmDue, woOpen, woClosed, spValue, spConsumed, spReorder, totalFaults:faults.length};
}

function initDashboardCharts(){
  const s = kpiStats();
  const chartOpts = {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94A3B8',font:{size:11},padding:12}}}};

  // Faults by Status
  const ctx1 = document.getElementById('chart-fault-status');
  if(ctx1) chartInstances.push(new Chart(ctx1,{type:'doughnut',data:{labels:['Open','In Progress','Closed'],datasets:[{data:[s.open,s.inProg,s.closed],backgroundColor:['#FBBF24','#60A5FA','#34D399'],borderWidth:0}]},options:{...chartOpts,cutout:'65%'}}));

  // PM Status
  const pmData = DB.assets.map(a=>pmStatus(a.lastPM,a.pmFrequency));
  const pmOk = pmData.filter(p=>p.status==='OK').length;
  const pmDue = pmData.filter(p=>p.status==='Due').length;
  const pmOv = pmData.filter(p=>p.status==='Overdue').length;
  const ctx2 = document.getElementById('chart-pm-status');
  if(ctx2) chartInstances.push(new Chart(ctx2,{type:'doughnut',data:{labels:['OK','Due','Overdue'],datasets:[{data:[pmOk,pmDue,pmOv],backgroundColor:['#34D399','#FBBF24','#EF4444'],borderWidth:0}]},options:{...chartOpts,cutout:'65%'}}));

  // Fault Types
  const typeCounts = {};
  DB.faults.forEach(f=>{typeCounts[f.faultType] = (typeCounts[f.faultType]||0)+1;});
  const sortedTypes = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const ctx3 = document.getElementById('chart-fault-types');
  if(ctx3) chartInstances.push(new Chart(ctx3,{type:'bar',data:{labels:sortedTypes.map(t=>t[0].substring(0,25)+'...'),datasets:[{data:sortedTypes.map(t=>t[1]),backgroundColor:'#00E5B8',borderRadius:4,barThickness:18}]},options:{...chartOpts,indexAxis:'y',scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94A3B8'}},y:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:10}}}},plugins:{legend:{display:false}}}}));

  // Fault Categories
  const catCounts = {};
  DB.faults.forEach(f=>{catCounts[f.faultCategory] = (catCounts[f.faultCategory]||0)+1;});
  const ctx4 = document.getElementById('chart-fault-cat');
  if(ctx4) chartInstances.push(new Chart(ctx4,{type:'doughnut',data:{labels:Object.keys(catCounts),datasets:[{data:Object.values(catCounts),backgroundColor:['#00E5B8','#60A5FA','#FBBF24','#F97316','#A78BFA','#94A3B8'],borderWidth:0}]},options:{...chartOpts,cutout:'55%'}}));
}

function saveAsset(assetCode){
  const code = document.getElementById('a-code').value.trim();
  const legacyCode = document.getElementById('a-legacy').value.trim();
  const assetName = document.getElementById('a-name').value.trim();
  const category = document.getElementById('a-cat').value;
  const model = document.getElementById('a-model').value.trim();
  const team = document.getElementById('a-team').value;
  const status = document.getElementById('a-status').value;
  const pmFrequency = parseInt(document.getElementById('a-pmfreq').value)||180;
  const installDate = document.getElementById('a-installdate').value;
  const lastPM = document.getElementById('a-lastpm').value || null;

  if(!code||!assetName||!category){toast('Please fill Asset Code, Name, and Category','error');return;}

  if(assetCode){
    const a = DB.assets.find(x=>x.assetCode===assetCode);
    Object.assign(a,{assetCode:code,legacyCode,assetName,category,model,team,status,pmFrequency,installDate,lastPM});
    toast('Asset updated');
  } else {
    if(DB.assets.find(x=>x.assetCode===code)){toast('Asset code already exists','error');return;}
    DB.assets.push({assetCode:code,legacyCode,assetName,category,model,team,status,pmFrequency,installDate,lastPM});
    toast('Asset added: '+code);
  }
  saveDB(); closeModal(); navigate('assets');
}

function deleteAsset(assetCode){
  const faultRefs = DB.faults.filter(f=>f.assetCode===assetCode).length;
  const woRefs = DB.workOrders.filter(w=>w.assetCode===assetCode).length;
  const total = faultRefs + woRefs;
  if(total > 0){
    toast('Cannot delete: asset is used in '+total+' fault(s)/work order(s)','error');
    return;
  }
  if(!confirm('Delete asset '+assetCode+'? This cannot be undone.')) return;
  DB.assets = DB.assets.filter(a=>a.assetCode!==assetCode);
  saveDB(); navigate('assets'); toast('Asset deleted');
}

function updateFaultTypeOptions(selected=null){
  const assetCode = document.getElementById('f-asset').value;
  const sel = document.getElementById('f-type');
  const asset = getAsset(assetCode);
  let types = ALL_FAULT_TYPES;
  if(asset) types = FAULT_TYPES_BY_CATEGORY[asset.category] || ALL_FAULT_TYPES;
  sel.innerHTML = `<option value="">Select type...</option>` + types.map(t=>`<option ${t===selected?'selected':''}>${t}</option>`).join('');

function saveFault(ticketNo){
  const date = document.getElementById('f-date').value;
  const assetCode = document.getElementById('f-asset').value;
  const faultType = document.getElementById('f-type').value;
  const description = document.getElementById('f-desc').value;
  const priority = document.getElementById('f-pri').value;
  const status = document.getElementById('f-status').value;
  const engineer = document.getElementById('f-eng').value || null;
  const partNumber = document.getElementById('f-part').value || null;
  const qtyUsed = parseInt(document.getElementById('f-qty').value)||0;
  const reporterName = document.getElementById('f-reporter').value;

  if(!date||!assetCode||!faultType){toast('Please fill Date, Asset, and Fault Type','error');return;}

  const asset = getAsset(assetCode);
  const unitCost = partNumber ? getPartCost(partNumber) : 0;

  if(ticketNo){
    const f = DB.faults.find(x=>x.ticketNo===ticketNo);
    // Revert old part usage
    if(f.partNumber){const op=DB.spareParts.find(p=>p.partNumber===f.partNumber);if(op)op.qtyUsed=Math.max(0,op.qtyUsed-f.qtyUsed);}
    Object.assign(f,{date,assetCode,faultType,description,priority,status,engineer,partNumber,qtyUsed,unitCost,assetName:asset?asset.assetName:'',faultCategory:faultToCategory(faultType),reporterName});
    // Apply new part usage
    if(partNumber){const np=DB.spareParts.find(p=>p.partNumber===partNumber);if(np)np.qtyUsed+=qtyUsed;}
    toast('Ticket updated');
  } else {
    const no = String(DB.nextTicket++).padStart(3,'0');
    const tNo = `TKT-${date.replace(/-/g,'')}-${no}`;
    DB.faults.push({ticketNo:tNo,date,assetCode,faultType,description,priority,status,engineer,partNumber,qtyUsed,unitCost,poRef:null,assetName:asset?asset.assetName:'',faultCategory:faultToCategory(faultType),reporterName,userCode:''});
    if(partNumber){const np=DB.spareParts.find(p=>p.partNumber===partNumber);if(np)np.qtyUsed+=qtyUsed;}
    toast('Ticket created: '+tNo);
  }
  saveDB(); closeModal(); navigate('faults');
}

function openWOModal(woNo=null){
  const w = woNo ? DB.workOrders.find(x=>x.woNo===woNo) : null;
  const isEdit = !!w;
  const ticketOpts = DB.faults.map(f=>`<option value="${f.ticketNo}" ${w&&w.ticketNo===f.ticketNo?'selected':''}>${f.ticketNo} — ${f.assetCode}</option>`).join('');
  const engOpts = DB.engineers.filter(e=>e.name).map(e=>`<option value="${e.code}" ${w&&w.engineer===e.code?'selected':''}>${e.name}</option>`).join('');

  openModal(isEdit?`Edit ${w.woNo}`:'New Work Order',`
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="form-group"><label class="form-label">Ticket No</label><select class="form-select" id="wo-ticket" onchange="autoFillWO()"><option value="">Select ticket...</option>${ticketOpts}</select></div>
      <div class="form-group"><label class="form-label">Engineer</label><select class="form-select" id="wo-eng"><option value="">Select...</option>${engOpts}</select></div>
      <div class="form-group md:col-span-2"><label class="form-label">Action Taken</label><textarea class="form-textarea" id="wo-action">${w?w.actionTaken:''}</textarea></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="wo-status"><option ${w&&w.status==='Open'?'selected':''}>Open</option><option ${w&&w.status==='In Progress'?'selected':''}>In Progress</option><option ${w&&w.status==='Closed'?'selected':''}>Closed</option></select></div>
      <div class="form-group"><label class="form-label">Close Date</label><input type="date" class="form-input" id="wo-close" value="${w?w.closeDate||'':''}"></div>
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveWO('${woNo||''}')">${isEdit?'Update':'Create'}</button>`);

  if(w) autoFillWO(w.ticketNo);
}

function autoFillWO(preSelect=null){
  const tNo = preSelect || document.getElementById('wo-ticket').value;
  const t = DB.faults.find(f=>f.ticketNo===tNo);
  if(t){
    if(!preSelect) document.getElementById('wo-eng').value = t.engineer||'';
  }
}

function saveWO(woNo){
  const ticketNo = document.getElementById('wo-ticket').value;
  const engineer = document.getElementById('wo-eng').value;
  const actionTaken = document.getElementById('wo-action').value;
  const status = document.getElementById('wo-status').value;
  const closeDate = document.getElementById('wo-close').value || null;
  if(!ticketNo){toast('Select a ticket','error');return;}
  const t = DB.faults.find(f=>f.ticketNo===ticketNo);
  if(!t){toast('Ticket not found','error');return;}

  if(woNo){
    const w = DB.workOrders.find(x=>x.woNo===woNo);
    Object.assign(w,{ticketNo,assetCode:t.assetCode,engineer,actionTaken,status,closeDate,faultType:t.faultType,partNumber:t.partNumber,qtyUsed:t.qtyUsed,lineCost:t.unitCost*t.qtyUsed,poRef:t.poRef});
    toast('Work order updated');
  } else {
    const no = String(DB.nextWO++).padStart(3,'0');
    DB.workOrders.push({woNo:`WO-${no}`,ticketNo,assetCode:t.assetCode,engineer,actionTaken,status,closeDate,faultType:t.faultType,partNumber:t.partNumber,qtyUsed:t.qtyUsed,lineCost:t.unitCost*t.qtyUsed,poRef:t.poRef});
    toast('Work order created: WO-'+no);
  }
  saveDB(); closeModal(); navigate('workorders');
}

   ============================================================ */
function renderSpareParts(){
  let totalValue=0, totalConsumed=0, totalReorder=0;
  const rows = DB.spareParts.map(p=>{
    const avail = p.initialQty - p.qtyUsed;
    const value = avail * p.unitCost;
    const consumed = p.qtyUsed * p.unitCost;
    const status = stockStatus(p);
    totalValue += value; totalConsumed += consumed;
    if(status==='Reorder'||status==='Out') totalReorder += Math.max(0,Math.ceil(p.minQty*1.5)-avail)*p.unitCost;
    return `<tr>
      <td>${p.partName}</td><td style="font-family:'Space Grotesk'">${p.partNumber}</td><td>${p.supplier}</td>
      <td>${p.initialQty}</td><td>${p.qtyUsed}</td>
      <td style="font-weight:600;color:${avail<=0?'var(--danger)':avail<=p.minQty?'var(--warning)':'var(--text-primary)'}">${avail}</td>
      <td>${p.minQty}</td><td>${fmtEgp(p.unitCost)}</td><td>${fmtEgp(value)}</td>
      <td>${badge(status==='OK'?'OK':status==='Out'?'Out':'Reorder', status.toLowerCase())}</td>
      <td class="no-print"><button class="btn btn-secondary btn-sm btn-icon" onclick="openPartModal('${p.partNumber}')" title="Edit"><i class="fa-solid fa-pen"></i></button> <button class="btn btn-danger btn-sm btn-icon" onclick="deletePart('${p.partNumber}')" title="Delete"><i class="fa-solid fa-trash"></i></button></td>
    </tr>`;
  });

  return `
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div><h2 style="font-size:24px;font-weight:700">Spare Parts Inventory</h2><p style="color:var(--text-muted);font-size:13px;margin-top:4px">${DB.spareParts.length} parts tracked</p></div>
    <button class="btn btn-primary" onclick="openPartModal()"><i class="fa-solid fa-plus"></i> Add Part</button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="card" style="border-left:3px solid var(--accent)"><div style="font-size:11px;color:var(--text-muted)">Total Inventory Value</div><div style="font-size:22px;font-weight:700;color:var(--accent);margin-top:4px">${fmtEgp(totalValue)}</div></div>
    <div class="card" style="border-left:3px solid var(--warning)"><div style="font-size:11px;color:var(--text-muted)">Total Parts Consumed</div><div style="font-size:22px;font-weight:700;color:var(--warning);margin-top:4px">${fmtEgp(totalConsumed)}</div></div>
    <div class="card" style="border-left:3px solid var(--danger)"><div style="font-size:11px;color:var(--text-muted)">Est. Reorder Cost</div><div style="font-size:22px;font-weight:700;color:var(--danger);margin-top:4px">${fmtEgp(totalReorder)}</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table class="data-table" id="spareparts-table">
        <thead><tr><th>Part Name</th><th>Part Number</th><th>Supplier</th><th>Initial</th><th>Used</th><th>Available</th><th>Min Qty</th><th>Unit Cost</th><th>Stock Value</th><th>Status</th><th class="no-print">Actions</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
  </div>`;
}



function openPartModal(partNumber=null){
  const p = partNumber ? DB.spareParts.find(x=>x.partNumber===partNumber) : null;
  const isEdit = !!p;
  const title = isEdit ? `Edit Part ${p.partNumber}` : 'Add New Part';

  openModal(title, `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="form-group"><label class="form-label">Part Name</label><input type="text" class="form-input" id="sp-name" value="${p?p.partName:''}" placeholder="e.g. Handpiece Bearing"></div>
      <div class="form-group"><label class="form-label">Part Number</label><input type="text" class="form-input" id="sp-number" value="${p?p.partNumber:''}" ${isEdit?'readonly':''} placeholder="e.g. HP-BR-002"></div>
      <div class="form-group"><label class="form-label">Supplier</label><input type="text" class="form-input" id="sp-supplier" value="${p?p.supplier:''}" placeholder="e.g. Sirona"></div>
      <div class="form-group"><label class="form-label">Initial Qty</label><input type="number" class="form-input" id="sp-initqty" min="0" value="${p?p.initialQty:0}"></div>
      <div class="form-group"><label class="form-label">Qty Used</label><input type="number" class="form-input" id="sp-qtyused" min="0" value="${p?p.qtyUsed:0}"></div>
      <div class="form-group"><label class="form-label">Min Qty</label><input type="number" class="form-input" id="sp-minqty" min="0" value="${p?p.minQty:1}"></div>
      <div class="form-group"><label class="form-label">Unit Cost (EGP)</label><input type="number" class="form-input" id="sp-unitcost" min="0" value="${p?p.unitCost:0}"></div>
    </div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="savePart('${partNumber||''}')">${isEdit?'Update':'Add'} Part</button>`);
}

function savePart(partNumber){
  const partName = document.getElementById('sp-name').value.trim();
  const pNumber = document.getElementById('sp-number').value.trim();
  const supplier = document.getElementById('sp-supplier').value.trim();
  const initialQty = parseInt(document.getElementById('sp-initqty').value)||0;
  const qtyUsed = parseInt(document.getElementById('sp-qtyused').value)||0;
  const minQty = parseInt(document.getElementById('sp-minqty').value)||0;
  const unitCost = parseInt(document.getElementById('sp-unitcost').value)||0;

  if(!partName||!pNumber){toast('Please fill Part Name and Part Number','error');return;}

  if(partNumber){
    const p = DB.spareParts.find(x=>x.partNumber===partNumber);
    Object.assign(p,{partName,partNumber:pNumber,supplier,initialQty,qtyUsed,minQty,unitCost});
    toast('Part updated');
  } else {
    if(DB.spareParts.find(x=>x.partNumber===pNumber)){toast('Part number already exists','error');return;}
    DB.spareParts.push({partName,partNumber:pNumber,supplier,initialQty,qtyUsed,minQty,unitCost});
    toast('Part added: '+pNumber);
  }
  saveDB(); closeModal(); navigate('spareparts');
}

function deletePart(partNumber){
  const faultRefs = DB.faults.filter(f=>f.partNumber===partNumber).length;
  const poRefs = DB.purchaseOrders.filter(po=>po.partNumber===partNumber).length;
  const total = faultRefs + poRefs;
  if(total > 0){
    toast('Cannot delete: part is used in '+total+' fault(s)/purchase order(s)','error');
    return;
  }
  if(!confirm('Delete part '+partNumber+'? This cannot be undone.')) return;
  DB.spareParts = DB.spareParts.filter(p=>p.partNumber!==partNumber);
  saveDB(); navigate('spareparts'); toast('Part deleted');
}

function openPOModal(poNo=null){

function autoFillPO(){
  const pn = document.getElementById('po-part').value;
  const sp = DB.spareParts.find(s=>s.partNumber===pn);
  if(sp){document.getElementById('po-pname').value=sp.partName;document.getElementById('po-supplier').value=sp.supplier;document.getElementById('po-ucost').value=sp.unitCost;calcPOTotal();}
}
function calcPOTotal(){
  const q=parseInt(document.getElementById('po-qty').value)||0;
  const u=parseInt(document.getElementById('po-ucost').value)||0;
  document.getElementById('po-total').value=fmtEgp(q*u);
}

function savePO(poNo){
  const dateRaised=document.getElementById('po-date').value;
  const partNumber=document.getElementById('po-part').value;
  const partName=document.getElementById('po-pname').value;
  const supplier=document.getElementById('po-supplier').value;
  const qtyOrdered=parseInt(document.getElementById('po-qty').value)||0;
  const unitCost=parseInt(document.getElementById('po-ucost').value)||0;
  const totalCost=qtyOrdered*unitCost;
  const expectedDelivery=document.getElementById('po-expdel').value;
  const poStatus=document.getElementById('po-status').value;
  const notes=document.getElementById('po-notes').value;
  if(!partNumber){toast('Select a part','error');return;}

  if(poNo){
    const p=DB.purchaseOrders.find(x=>x.poNumber===poNo);

}

/* ============================================================
   ENGINEERS & KPI SCORECARDS
   ============================================================ */
function renderEngineers(){
  // Compute KPIs
  const kpis = DB.engineers.filter(e=>e.name).map(eng=>{
    const assigned = DB.faults.filter(f=>f.engineer===eng.code);
    const closed = assigned.filter(f=>f.status==='Closed');
    const total = assigned.length;
    const closedCount = closed.length;
    const closurePct = total ? Math.round(closedCount/total*100) : 0;
    const avgRes = closed.length ? Math.round(closed.reduce((s,f)=>s+daysBetween(f.date, DB.workOrders.find(w=>w.ticketNo===f.ticketNo)?.closeDate||f.date),0)/closed.length) : 0;
    const highPri = closed.filter(f=>f.priority==='Critical'||f.priority==='High').length;
    // PM compliance
    const pmAssets = DB.assets.filter(a=>a.lastPM);
    const pmOk = pmAssets.filter(a=>pmStatus(a.lastPM,a.pmFrequency).status==='OK').length;
    const pmCompliance = pmAssets.length ? Math.round(pmOk/pmAssets.length*100) : 100;
    const partsCost = assigned.reduce((s,f)=>s+(f.unitCost*f.qtyUsed||0),0);
    return {...eng, total, closedCount, closurePct, avgRes, highPri, pmCompliance, partsCost};
  });

  const teamTotal = kpis.reduce((s,k)=>s+k.total,0);
  const teamClosed = kpis.reduce((s,k)=>s+k.closedCount,0);
  const teamClosure = teamTotal ? Math.round(teamClosed/teamTotal*100) : 0;
  const teamAvgRes = kpis.filter(k=>k.avgRes>0).length ? Math.round(kpis.filter(k=>k.avgRes>0).reduce((s,k)=>s+k.avgRes,0)/kpis.filter(k=>k.avgRes>0).length) : 0;
  const teamCost = kpis.reduce((s,k)=>s+k.partsCost,0);

  function rating(score){
    if(score>=85) return {label:'Excellent',cls:'rating-excellent'};
    if(score>=70) return {label:'Strong',cls:'rating-strong'};
    if(score>=55) return {label:'Average',cls:'rating-average'};
    if(score>=40) return {label:'Below',cls:'rating-below'};
    return {label:'Critical',cls:'rating-critical'};
  }

  function composite(k){
    // Weighted: closure%*20 + closureVol*20 + speed*15 + highPri*20 + pmComp*15 + cost*10
    const volScore = Math.min(k.total/5*100,100);
    const closeScore = k.closurePct;
    const speedScore = k.avgRes ? Math.max(0, 100 - k.avgRes*5) : 50;
    const highScore = Math.min(k.highPri/3*100,100);
    const pmScore = k.pmCompliance;
    const avgCost = kpis.reduce((s,x)=>s+x.partsCost,0) / (kpis.length||1);
    const costScore = avgCost ? Math.max(0, 100 - (k.partsCost/avgCost)*50) : 100;
    return Math.round(volScore*.2 + closeScore*.2 + speedScore*.15 + highScore*.2 + pmScore*.15 + costScore*.1);
  }

  return `
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div><h2 style="font-size:24px;font-weight:700">Engineers & Performance</h2><p style="color:var(--text-muted);font-size:13px;margin-top:4px">Staff directory with weighted KPI scorecards</p></div>
    <button class="btn btn-primary" onclick="openEngModal()"><i class="fa-solid fa-plus"></i> Add Engineer</button>
  </div>

  <!-- Team Rollup -->
  <div class="card mb-6" style="border-left:3px solid var(--accent)">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Team Rollup — MT-412 Clinic 412</h3>
    <div class="grid grid-cols-2 md:grid-cols-6 gap-4" style="font-size:13px">
      <div><span style="color:var(--text-muted)">Engineers</span><div style="font-size:20px;font-weight:700;margin-top:2px">${kpis.length}</div></div>
      <div><span style="color:var(--text-muted)">Total Tickets</span><div style="font-size:20px;font-weight:700;margin-top:2px">${teamTotal}</div></div>
      <div><span style="color:var(--text-muted)">Closed</span><div style="font-size:20px;font-weight:700;margin-top:2px">${teamClosed}</div></div>
      <div><span style="color:var(--text-muted)">Closure %</span><div style="font-size:20px;font-weight:700;margin-top:2px">${teamClosure}%</div></div>
      <div><span style="color:var(--text-muted)">Avg Resolution</span><div style="font-size:20px;font-weight:700;margin-top:2px">${teamAvgRes}d</div></div>
      <div><span style="color:var(--text-muted)">Total Parts Cost</span><div style="font-size:20px;font-weight:700;margin-top:2px">${fmtEgp(teamCost)}</div></div>
    </div>
  </div>

  <!-- Criteria -->
  <div class="card mb-6">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Evaluation Criteria & Weights</h3>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3" style="font-size:12px">
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">20%</span> <span style="color:var(--text-secondary)">Tickets Closed (volume)</span></div>
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">20%</span> <span style="color:var(--text-secondary)">Closure Rate %</span></div>
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">15%</span> <span style="color:var(--text-secondary)">Avg Resolution Days</span></div>
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">20%</span> <span style="color:var(--text-secondary)">High-Priority Handled</span></div>
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">15%</span> <span style="color:var(--text-secondary)">PM Compliance %</span></div>
      <div style="padding:8px 12px;border-radius:8px;background:var(--bg-secondary)"><span style="color:var(--accent);font-weight:700">10%</span> <span style="color:var(--text-secondary)">Cost Discipline</span></div>
    </div>
  </div>

  <!-- Scorecards -->
  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Engineer</th><th>Phone</th><th>Tickets</th><th>Closed</th><th>Closure %</th><th>Avg Res (d)</th><th>High-Pri</th><th>PM %</th><th>Parts Cost</th><th>Score</th><th>Rating</th><th>Actions</th></tr></thead>
        <tbody>${kpis.map(k=>{
          const sc = composite(k);
          const r = rating(sc);
          return `<tr>
            <td style="font-weight:600">${k.name}</td>
            <td style="font-family:'Space Grotesk';font-size:12px">${k.phone?formatPhoneDisplay(k.phone):'<span style="color:var(--danger)">Not set</span>'}</td>
            <td>${k.total}</td><td>${k.closedCount}</td>
            <td>${k.closurePct}%</td><td>${k.avgRes||'—'}</td><td>${k.highPri}</td><td>${k.pmCompliance}%</td>
            <td>${fmtEgp(k.partsCost)}</td>
            <td style="font-size:18px;font-weight:700;font-family:'Space Grotesk';color:${r.cls.includes('excellent')?'var(--success)':r.cls.includes('strong')?'var(--info)':r.cls.includes('average')?'var(--warning)':'var(--danger)'}">${sc}</td>
            <td><span class="${r.cls}" style="font-weight:700">${r.label}</span></td>
            <td><button class="btn btn-secondary btn-sm btn-icon" onclick="openEngModal('${k.code}')" title="Edit"><i class="fa-solid fa-pen"></i></button></td>
          </tr>`;}).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

// Normalizes a phone number to digits-only international format (no +, no leading 0),
// e.g. "01012345678" -> "201012345678" (assumes Egypt +20 if a local 0-prefixed number is entered).
function normalizePhone(raw){
  if(!raw) return '';
  let d = String(raw).replace(/[^\d]/g,'');
  if(d.startsWith('0')) d = '20' + d.slice(1); // local Egyptian format -> country code
  return d;
}
function formatPhoneDisplay(raw){
  const d = normalizePhone(raw);
  return d ? '+' + d : '—';
}
function buildFaultWhatsAppMessage(f){
  const asset = getAsset(f.assetCode);
  const lines = [
    `*بلاغ عطل جديد — عيادة 412*`,
    `رقم التذكرة: ${f.ticketNo}`,
    `الجهاز: ${f.assetCode} — ${asset?asset.assetName:f.assetName||''}`,
    `نوع العطل: ${f.faultType||''}`,
    `الوصف: ${f.description||'—'}`,
    `الأولوية: ${f.priority}`,
    `تاريخ البلاغ: ${f.date}`,
    f.reporterName ? `المُبلّغ: ${f.reporterName}` : null,
  ].filter(Boolean);
  return lines.join('\n');
}
function whatsappLinkForFault(phone, f){
  const num = normalizePhone(phone);
  const text = encodeURIComponent(buildFaultWhatsAppMessage(f));
  return `https://wa.me/${num}?text=${text}`;
}

}

function sendFaultWhatsApp(ticketNo){

function openEngModal(code=null){
  const isEdit = !!code;
  let eng = isEdit ? DB.engineers.find(e=>e.code===code) : null;
  // Generate the next sequential code (ENG-003, ENG-004, ...) instead of relying
  // on pre-reserved empty slots, so new engineers can always be added.
  const maxNum = DB.engineers.reduce((max,e)=>{
    const m = /^ENG-(\d+)$/.exec(e.code);
    return m ? Math.max(max, parseInt(m[1],10)) : max;
  }, 0);
  const newCode = 'ENG-' + String(maxNum+1).padStart(3,'0');
  openModal(isEdit?`Edit Engineer — ${eng.code}`:'Add Engineer',`
    <div class="form-group"><label class="form-label">Engineer Code</label><input type="text" class="form-input" id="eng-code" value="${isEdit?eng.code:newCode}" readonly></div>
    <div class="form-group"><label class="form-label">Engineer Name</label><input type="text" class="form-input" id="eng-name" placeholder="Full name" value="${isEdit?eng.name:''}"></div>
    <div class="form-group"><label class="form-label">WhatsApp Number</label><input type="text" class="form-input" id="eng-phone" placeholder="e.g. 01012345678 or 201012345678" value="${isEdit?(eng.phone||''):''}"><p style="font-size:11px;color:var(--text-muted);margin-top:4px">Used to send fault details via WhatsApp when this engineer is assigned to a ticket.</p></div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEng()">Save</button>`);
}
function saveEng(){
  const code=document.getElementById('eng-code').value;
  const name=document.getElementById('eng-name').value.trim();
  const phone=normalizePhone(document.getElementById('eng-phone').value.trim());
  if(!name){toast('Enter a name','error');return;}
  const eng=DB.engineers.find(e=>e.code===code);
  if(eng){
    eng.name=name;eng.phone=phone;
    saveDB();closeModal();navigate('engineers');toast('Engineer saved');
  } else {
    DB.engineers.push({code,name,phone});
    saveDB();closeModal();navigate('engineers');toast('Engineer added: '+name);
  }
}

function getQRBaseURL(){
  try {
    const saved = localStorage.getItem('clinic412_cmms');
    if(saved){ const db = JSON.parse(saved); if(db.settings && db.settings.qrBaseURL) return db.settings.qrBaseURL; }
  } catch(e){}
  return window.location.origin + '/fault_report.html';
}

function qrLookup() {
  const input = document.getElementById('qr-lookup').value.trim().toUpperCase();
  const resultDiv = document.getElementById('qr-lookup-result');
  if (!input) { resultDiv.style.display = 'none'; return; }

  // Search by asset code, legacy code, or name
  const idx = DB.assets.findIndex(a =>
    a.assetCode.toUpperCase() === input ||
    (a.legacyCode || '').toUpperCase() === input ||
    a.assetName.toUpperCase().includes(input)
  );

function drawQRCanvases(){
  if(typeof QRCode === 'undefined'){
    console.warn('QRCode library not loaded, using placeholders');
    drawQRPlaceholders();
    return;
  }
  const base = getQRBaseURL();
  DB.assets.forEach((a,i)=>{
    const canvas = document.getElementById(`qr-${i}`);
    if(!canvas) return;
    const url = base + '?unit=' + a.assetCode;
    QRCode.toCanvas(canvas, url, {
      width: 80, margin: 1,
      color: { dark: '#00E5B8', light: '#0A0F1E' },
      errorCorrectionLevel: 'M'
    }, function(error){
      if(error){
        // Fallback: draw placeholder
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0A0F1E'; ctx.fillRect(0,0,80,80);
        ctx.fillStyle = '#334155'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('QR Error', 40, 44);
      }
    });
  });
}

function drawQRPlaceholders(){
  DB.assets.forEach((a,i)=>{
    const canvas = document.getElementById(`qr-${i}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0A0F1E'; ctx.fillRect(0,0,80,80);
    ctx.fillStyle = '#334155'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(a.assetCode.substring(a.assetCode.length-3), 40, 44);
  });
}

function downloadQR(index) {
  const a = DB.assets[index];
  if (!a) return;
  const url = getQRBaseURL() + '?unit=' + a.assetCode;
  if (typeof QRCode === 'undefined') { toast('QR library not loaded', 'error'); return; }
  QRCode.toDataURL(url, { width: 400, margin: 2, color: { dark: '#000000', light: '#FFFFFF' }, errorCorrectionLevel: 'M' }, function(err, dataUrl) {
    if (err) { toast('Failed to generate QR', 'error'); return; }
    const link = document.createElement('a');
    link.download = 'QR-' + a.assetCode + '.png';
    link.href = dataUrl;
    link.click();
    toast('QR downloaded: ' + a.assetCode);
  });
}

function downloadAllQR() {
  if (typeof QRCode === 'undefined') { toast('QR library not loaded', 'error'); return; }
  let delay = 0;
  DB.assets.forEach((a, i) => {
    setTimeout(() => {
      const url = getQRBaseURL() + '?unit=' + a.assetCode;
      QRCode.toDataURL(url, { width: 400, margin: 2, color: { dark: '#000000', light: '#FFFFFF' }, errorCorrectionLevel: 'M' }, function(err, dataUrl) {
        if (err) return;
        const link = document.createElement('a');
        link.download = 'QR-' + a.assetCode + '.png';
        link.href = dataUrl;
        link.click();
      });
    }, delay);
    delay += 300; // Stagger downloads
  });
  toast('Downloading ' + DB.assets.length + ' QR codes...', 'info');
}

function renderMgmtBrief(){
  const s = kpiStats();
  const closureRate = s.totalFaults ? Math.round(s.closed/s.totalFaults*100) : 0;
  const avgCost = s.totalFaults ? Math.round(s.totalPartsCost/s.totalFaults) : 0;
  const startDate = daysAgo(30);
  const endDate = daysAgo(0);

  // Breakdown by category
  const catBreak = {};
  DB.faults.forEach(f=>{
    const a = getAsset(f.assetCode);
    const cat = a?a.category:'Unknown';
    if(!catBreak[cat]) catBreak[cat]={tickets:0,closed:0,open:0,high:0,cost:0};
    catBreak[cat].tickets++;
    if(f.status==='Closed') catBreak[cat].closed++;
    else catBreak[cat].open++;
    if(f.priority==='High'||f.priority==='Critical') catBreak[cat].high++;
    catBreak[cat].cost += f.unitCost*f.qtyUsed||0;
  });

  // Most frequent fault types
  const typeCounts = {};
  DB.faults.forEach(f=>{typeCounts[f.faultType]=(typeCounts[f.faultType]||0)+1;});
  const topTypes = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Equipment with most faults
  const assetFaults = {};
  DB.faults.forEach(f=>{assetFaults[f.assetCode]=(assetFaults[f.assetCode]||0)+1;});
  const topAssets = Object.entries(assetFaults).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Engineer activity
  const engActivity = {};
  DB.faults.forEach(f=>{
    const name = getEngineer(f.engineer);
    if(!engActivity[name]) engActivity[name]={tickets:0,closed:0,high:0,cost:0};
    engActivity[name].tickets++;
    if(f.status==='Closed') engActivity[name].closed++;
    if(f.priority==='High'||f.priority==='Critical') engActivity[name].high++;
    engActivity[name].cost += f.unitCost*f.qtyUsed||0;

  // Pending POs
  const pendingPOs = DB.purchaseOrders.filter(p=>p.poStatus!=='Delivered');

  return `

  </div>

      <div><span style="color:var(--text-muted)">End Date</span><div style="font-weight:600;margin-top:2px">${endDate}</div></div>

    <div class="card" style="border-top:3px solid var(--accent)"><div style="font-size:28px;font-weight:700;color:var(--accent)">${s.totalFaults}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Tickets in Period</div></div>

  </div>

  <!-- Most Frequent Fault Types -->
  <div class="card mb-6">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Most Frequent Fault Types</h3>
    <table class="data-table"><thead><tr><th>Fault Type</th><th>Tickets</th><th>High Pri</th><th>Cost (EGP)</th></tr></thead>
    <tbody>${topTypes.map(([type,count])=>{
      const related = DB.faults.filter(f=>f.faultType===type);
      const high = related.filter(f=>f.priority==='High'||f.priority==='Critical').length;
      const cost = related.reduce((s,f)=>s+(f.unitCost*f.qtyUsed||0),0);
      return `<tr><td style="direction:rtl;text-align:right;max-width:300px">${type}</td><td>${count}</td><td>${high}</td><td>${fmtEgp(cost)}</td></tr>`;
    }).join('')}</tbody></table>
  </div>

  <!-- Equipment with Most Faults -->
  <div class="card mb-6">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Equipment with Most Faults</h3>
    <table class="data-table"><thead><tr><th>Asset Code</th><th>Asset Name</th><th>Tickets</th><th>Open</th><th>Cost (EGP)</th></tr></thead>
    <tbody>${topAssets.map(([code,count])=>{
      const a=getAsset(code);
      const related=DB.faults.filter(f=>f.assetCode===code);
      const open=related.filter(f=>f.status!=='Closed').length;
      const cost=related.reduce((s,f)=>s+(f.unitCost*f.qtyUsed||0),0);
      return `<tr><td style="font-family:'Space Grotesk'">${code}</td><td>${a?a.assetName:''}</td><td>${count}</td><td>${open}</td><td>${fmtEgp(cost)}</td></tr>`;
    }).join('')}</tbody></table>
  </div>

  <!-- Engineer Activity -->
  <div class="card mb-6">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Engineer Activity in Period</h3>
    <table class="data-table"><thead><tr><th>Engineer</th><th>Tickets</th><th>Closed</th><th>High Pri</th><th>Parts Cost (EGP)</th></tr></thead>
    <tbody>${Object.entries(engActivity).map(([name,d])=>`<tr><td style="font-weight:600">${name}</td><td>${d.tickets}</td><td>${d.closed}</td><td>${d.high}</td><td>${fmtEgp(d.cost)}</td></tr>`).join('')}</tbody></table>
  </div>

  <!-- Pending POs -->
  <div class="card mb-6">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:8px">Pending Purchase Orders</h3>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Parts requiring procurement — Stock Out or Reorder level triggered</p>
    ${pendingPOs.length?`<table class="data-table"><thead><tr><th>PO Number</th><th>Part Number</th><th>Part Name</th><th>Supplier</th><th>Qty</th><th>Total</th><th>Status</th><th>Expected</th></tr></thead>
    <tbody>${pendingPOs.map(p=>`<tr><td style="font-family:'Space Grotesk'">${p.poNumber}</td><td>${p.partNumber}</td><td>${p.partName}</td><td>${p.supplier}</td><td>${p.qtyOrdered}</td><td>${fmtEgp(p.totalCost)}</td><td>${badge(p.poStatus,p.poStatus.toLowerCase())}</td><td>${p.expectedDelivery||'—'}</td></tr>`).join('')}</tbody></table>`:'<p style="color:var(--text-muted);font-size:13px">No pending purchase orders.</p>'}
  </div>

  <!-- PM Policy -->
  <div class="card">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">PM Policy</h3>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.8">
      <p>&bull; Dental Units — preventive maintenance every 6 months (180 days).</p>
      <p>&bull; Sterilisation Equipment (Autoclaves) — preventive maintenance every 3 months (90 days).</p>
      <p>&bull; X-Ray Imaging — preventive maintenance every 6 months (180 days).</p>
    </div>
  </div>
  <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px">&copy; Clinic 412 CMMS · Brief generated for the period above · Confidential — internal use only</p>`;
}

/* ============================================================
   CROSS-TAB SYNC — Auto-refresh when fault_report.html writes
   ============================================================ */
window.addEventListener('storage', function(e) {
  if (e.key === 'clinic412_cmms') {
    try {
      const newDB = JSON.parse(e.newValue);
      const oldFaults = (DB.faults || []).length;
      DB = newDB;
      const newFaults = (DB.faults || []).length;
      // If a new fault was added (likely from QR scan), show notification
      if (newFaults > oldFaults) {
        const latestFault = DB.faults[DB.faults.length - 1];
        if (latestFault && latestFault.source === 'qr') {
          toast('New QR fault: ' + latestFault.ticketNo + ' — ' + latestFault.assetCode, 'info');
        }
      }
      // Refresh current page to show updated data
      navigate(currentPage);
      buildNav();
    } catch(err) { console.warn('Storage sync error:', err); }
  }
});
</script>
